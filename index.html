<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff7a00, #ffb347);
  margin: 0;
}

.container {
  max-width: 800px;
  margin: 40px auto;
  background: white;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1 {
  text-align: center;
  color: #ff7a00;
}

.subtitle {
  text-align: center;
  margin-bottom: 25px;
}

.form-group {
  margin-bottom: 20px;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  margin-top: 5px;
}

.question {
  margin-bottom: 25px;
}

.options {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
  flex-wrap: wrap;
  gap: 5px;
}

.options input[type="radio"] {
  display: none;
}

.options span {
  padding: 10px 14px;
  border-radius: 50px;
  border: 2px solid #ff7a00;
  color: #ff7a00;
  cursor: pointer;
  transition: 0.3s;
}

.options input[type="radio"]:checked + span {
  background: #ff7a00;
  color: white;
}

button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 10px;
  background: #ff7a00;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #e56b00;
}

.success {
  text-align: center;
  color: green;
  display: none;
  margin-top: 15px;
}
</style>
</head>
